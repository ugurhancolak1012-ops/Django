<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anket Sonuçları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f0f2f5 0%, #e0e7ff 100%);
            min-height: 100vh;
            padding: 40px 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        h1 {
            color: #4a148c;
            text-align: center;
            margin-bottom: 10px;
        }
        .thank-you {
            text-align: center;
            font-size: 1.2em;
            color: #6c757d;
            margin-bottom: 40px;
        }
        .result-card {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fff;
            transition: transform 0.2s;
        }
        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .question-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .badge-count {
            background-color: #6f42c1;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
            font-size: 0.9em;
        }
        .choice-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f3f5;
        }
        .choice-item:last-child {
            border-bottom: none;
        }
        .vote-badge {
            background-color: #e9ecef;
            color: #495057;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .btn-restart {
            display: block;
            width: 200px;
            margin: 40px auto 0;
            padding: 12px;
            border-radius: 50px;
            background: #28a745;
            border: none;
            color: white;
            font-size: 1.1em;
            text-align: center;
            text-decoration: none;
            transition: background 0.3s;
        }
        .btn-restart:hover {
            background: #218838;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 Tebrikler!</h1>
        <p class="thank-you">Anketi başarıyla tamamladınız. İşte genel sonuçlar:</p>

        {% for question in question_list %}
        <div class="result-card">
            <div class="question-title">
                <span class="badge-count">{{ forloop.counter }}</span>
                {{ question.question_text }}
            </div>
            
            <div class="choices-list">
                {% for choice in question.choice_set.all %}
                <div class="choice-item">
                    <span>{{ choice.choice_text }}</span>
                    <span class="vote-badge">{{ choice.votes }} Oy</span>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endfor %}

        <a href="{% url 'polls:index' %}" class="btn-restart">🔄 Tekrar Başla</a>
    </div>

</body>
</html>
