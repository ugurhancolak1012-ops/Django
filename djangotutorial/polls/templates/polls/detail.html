<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru {{ current_step }}/{{ total_steps }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .survey-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 700px;
            width: 100%;
        }
        .progress {
            height: 10px;
            border-radius: 5px;
            margin-bottom: 30px;
            background-color: #e9ecef;
        }
        .progress-bar {
            background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
        }
        h2 {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 25px;
        }
        .option-card {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }
        .option-card:hover {
            border-color: #0072ff;
            background-color: #f8f9fa;
        }
        .option-card.selected {
            border-color: #0072ff;
            background-color: #e7f1ff;
        }
        .form-check-input {
            margin-right: 15px;
            transform: scale(1.2);
        }
        .btn-vote {
            background: #0072ff;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            font-size: 1.1em;
            margin-top: 20px;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-vote:hover {
            background: #0056b3;
        }
        .step-indicator {
            text-align: right;
            color: #adb5bd;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="survey-container">
        <div class="step-indicator">Soru {{ current_step }} / {{ total_steps }}</div>
        <div class="progress">
            <div class="progress-bar" role="progressbar" style="width: {{ progress_percentage }}%;" aria-valuenow="{{ progress_percentage }}" aria-valuemin="0" aria-valuemax="100"></div>
        </div>

        <form action="{% url 'polls:vote' question.id %}" method="post">
            {% csrf_token %}
            
            <h2>{{ question.question_text }}</h2>
            
            {% if error_message %}
                <div class="alert alert-danger">{{ error_message }}</div>
            {% endif %}

            <div class="options-list">
                {% for choice in question.choice_set.all %}
                <label class="option-card" for="choice{{ forloop.counter }}">
                    <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}" class="form-check-input">
                    <span class="option-text">{{ choice.choice_text }}</span>
                </label>
                {% endfor %}
            </div>

            <button type="submit" class="btn btn-vote">İlerle ➜</button>
        </form>
    </div>

    <script>
        // Seçenek seçildiğinde kartın stilini değiştir
        const options = document.querySelectorAll('.option-card');
        options.forEach(option => {
            option.addEventListener('click', function() {
                // Hepsini temizle
                options.forEach(opt => opt.classList.remove('selected'));
                // Seçileni işaretle
                this.classList.add('selected');
                // Radyo butonunu işaretle (etiket olduğu için otomatik ama garanti olsun)
                this.querySelector('input').checked = true;
            });
        });
    </script>
</body>
</html>
